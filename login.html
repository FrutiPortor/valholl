<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhöll — Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-box {
      max-width: 400px;
      margin: 0 auto;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-box input {
      width: 100%;
      font-family: var(--font-body);
      background: var(--color-bg-secondary);
      border: 1px solid var(--color-border);
      padding: 0.85rem 1rem;
      color: var(--color-text);
      font-size: 1rem;
      margin-bottom: 1.25rem;
      text-align: center;
    }

    .login-box input:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .login-error {
      color: #e04a4a;
      font-size: 0.9rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">Valhöll</div>
    <nav class="header-nav">
      <button class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      <ul id="nav-menu">
        <li><a href="feed.html">Лента</a></li>
        <li><a href="index.html">Главная</a></li>
      </ul>
    </nav>
  </header>

  <section class="section-block">
    <div class="login-box">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;opacity:0.5">⚔️</div>
      <h2 class="section-title" style="margin-bottom:1.5rem">Вход</h2>
      <input id="pass-input" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="feed-btn" onclick="doLogin()" style="width:100%">Войти</button>
      <div class="login-error" id="login-error">Неверный пароль</div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">Valhöll</div>
    <p class="footer-text">&copy; 2026 Valhöll. Все права защищены.</p>
  </footer>

  <script>
    function doLogin() {
      if (login(document.getElementById('pass-input').value)) {
        const url = new URLSearchParams(location.search).get('redirect') || 'feed.html';
        location.href = url;
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }
  </script>
  <script src="js/main.js"></script>
</body>
</html>
