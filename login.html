<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhöll — Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-box {
      max-width: 400px;
      margin: 0 auto;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      padding: 2.5rem 2rem;
      text-align: center;
    }

    .login-btn-google {
      font-family: var(--font-gothic);
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.85rem 2rem;
      border: 1px solid var(--color-accent);
      background: transparent;
      color: var(--color-accent);
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
      width: 100%;
      margin-top: 1.5rem;
    }

    .login-btn-google:hover {
      background: var(--color-accent);
      color: #000;
    }

    .login-error {
      color: #e04a4a;
      font-size: 0.9rem;
      margin-top: 0.75rem;
      display: none;
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-logo">Valhöll</div>
    <nav class="header-nav">
      <button class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      <ul id="nav-menu">
        <li><a href="feed.html">Лента</a></li>
        <li><a href="index.html">Главная</a></li>
      </ul>
    </nav>
  </header>

  <section class="section-block">
    <div class="login-box">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;opacity:0.5">⚔️</div>
      <h2 class="section-title" style="margin-bottom:0.5rem">Вход</h2>
      <p class="section-text" style="margin-bottom:0">Войди через Google</p>
      <button class="login-btn-google" onclick="loginWithGoogle()">Google</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">Valhöll</div>
    <p class="footer-text">&copy; 2026 Valhöll. Все права защищены.</p>
  </footer>

  <script>
    async function loginWithGoogle() {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await firebase.auth().signInWithPopup(provider);
        const url = new URLSearchParams(location.search).get('redirect') || 'feed.html';
        location.href = url;
      } catch (e) {
        document.getElementById('login-error').textContent = 'Ошибка входа: ' + e.message;
        document.getElementById('login-error').style.display = 'block';
      }
    }
  </script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
