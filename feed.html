<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhöll — Лента</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-left">
      <div class="header-logo">Valhöll</div>
      <a href="new-post.html" class="header-new-post">+ Новый пост</a>
    </div>
    <div class="header-search-wrap">
      <input type="text" id="search-input" class="header-search-input" placeholder="Поиск по постам..." oninput="applyFilters()">
    </div>
    <div class="header-right">
      <nav class="header-nav">
        <button class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
        <ul id="nav-menu">
          <li><a href="index.html">Главная</a></li>
          <li><a href="new-post.html">Новый пост</a></li>
          <li class="nav-user-item"><span class="user-name" id="user-name"></span><a class="auth-btn nav-btn" onclick="toggleAuth()">Войти</a></li>
        </ul>
      </nav>
      <button class="fullscreen-btn" id="fullscreen-btn" onclick="toggleFullscreenFeed()" title="На весь экран">⛶</button>
    </div>
  </header>

  <div class="sort-bar" id="sort-bar">
    <div class="sort-group">
      <button class="sort-btn active" data-filter="type" data-value="all">Все</button>
      <button class="sort-btn" data-filter="type" data-value="image">Изображение</button>
      <button class="sort-btn" data-filter="type" data-value="video">Видео</button>
    </div>
    <div class="sort-group">
      <button class="sort-btn active" data-filter="sort" data-value="new">Новое</button>
      <button class="sort-btn" data-filter="sort" data-value="best">Лучшее</button>
      <button class="sort-btn" data-filter="sort" data-value="likes">По лайкам</button>
    </div>
    <div class="sort-group">
      <button class="sort-btn active" data-filter="date" data-value="all">Всё время</button>
      <button class="sort-btn" data-filter="date" data-value="today">Сегодня</button>
      <button class="sort-btn" data-filter="date" data-value="week">Неделя</button>
      <button class="sort-btn" data-filter="date" data-value="month">Месяц</button>
      <button class="sort-btn" data-filter="date" data-value="year">Год</button>
    </div>
  </div>

  <section class="section-block feed-section" id="feed">
    <div class="feed-grid" id="feed-container"></div>
  </section>

  <nav class="bottom-nav" id="bottom-nav">
    <a href="feed.html" class="bottom-nav-item active">
      <span class="bottom-nav-icon">📋</span>
      <span class="bottom-nav-label">Лента</span>
    </a>
    <a href="#" class="bottom-nav-item" onclick="event.preventDefault(); filterVideos()">
      <span class="bottom-nav-icon">🎬</span>
      <span class="bottom-nav-label">Видосы</span>
    </a>
    <a href="new-post.html" class="bottom-nav-item">
      <span class="bottom-nav-icon">+</span>
      <span class="bottom-nav-label">Новый</span>
    </a>
    <a href="#" class="bottom-nav-item" onclick="event.preventDefault(); toggleAuth()">
      <span class="bottom-nav-icon">👤</span>
      <span class="bottom-nav-label">Войти</span>
    </a>
  </nav>

  <footer class="footer">
    <div class="footer-logo">Valhöll</div>
    <p class="footer-text">&copy; 2026 Valhöll. Все права защищены.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
