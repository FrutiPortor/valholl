<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhöll — Лента</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-logo">Valhöll</div>
    <nav class="header-nav">
      <ul>
        <li><a href="feed.html">Лента</a></li>
        <li><a href="index.html">Главная</a></li>
      </ul>
    </nav>
  </header>

  <section class="section-block" id="feed">
    <h2 class="section-title">Лента</h2>

    <div class="feed-controls">
      <button class="feed-btn feed-btn--new" onclick="showNewPostForm()">+ Новый пост</button>
    </div>

    <div id="new-post-form" class="new-post-form" style="display:none">
      <textarea id="post-text" class="new-post-input" placeholder="Текст поста..." rows="3"></textarea>
      <input id="post-image" class="new-post-input" type="url" placeholder="Ссылка на картинку (необязательно)">
      <input id="post-video" class="new-post-input" type="url" placeholder="Ссылка на YouTube (необязательно)">
      <div class="new-post-actions">
        <button class="feed-btn" onclick="addNewPost()">Опубликовать</button>
        <button class="feed-btn feed-btn--cancel" onclick="hideNewPostForm()">Отмена</button>
      </div>
    </div>

    <div class="feed" id="feed-container">
    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">Valhöll</div>
    <p class="footer-text">&copy; 2026 Valhöll. Все права защищены.</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
