<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valhöll — Новый пост</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-logo">Valhöll</div>
    <nav class="header-nav">
      <button class="burger" onclick="toggleMenu()"><span></span><span></span><span></span></button>
      <ul id="nav-menu">
        <li><a href="feed.html">Лента</a></li>
        <li><a href="index.html">Главная</a></li>
        <li><a class="auth-btn nav-btn" onclick="toggleAuth()">Войти</a></li>
      </ul>
    </nav>
  </header>

  <section class="section-block">
    <div class="new-post-page">
      <div class="new-post-page-ornament">⚔️</div>
      <h2 class="section-title">Новый пост</h2>
      <p class="section-text">Поведай миру о своих подвигах</p>

      <div class="new-post-page-form">
        <div class="new-post-field">
          <label class="new-post-label" for="post-text">Текст</label>
          <textarea id="post-text" class="new-post-input" placeholder="О чём ты хочешь рассказать?" rows="5"></textarea>
        </div>

        <div class="new-post-field">
          <label class="new-post-label" for="post-image">Изображение</label>
          <div class="new-post-input-wrap">
            <input id="post-image" class="new-post-input" type="url" placeholder="https://example.com/image.jpg" oninput="previewImage(this.value)">
          </div>
          <div id="image-preview" class="new-post-preview"></div>
        </div>

        <div class="new-post-field">
          <label class="new-post-label" for="post-video">Видео</label>
          <div class="new-post-input-wrap">
            <input id="post-video" class="new-post-input" type="url" placeholder="Ссылка на YouTube / RuTube / .mp4" oninput="previewVideo(this.value)">
          </div>
          <div id="video-preview" class="new-post-preview"></div>
        </div>

        <div class="new-post-actions">
          <button class="feed-btn" onclick="publishPost()">Опубликовать</button>
          <a href="feed.html" class="feed-btn feed-btn--cancel">Отмена</a>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-logo">Valhöll</div>
    <p class="footer-text">&copy; 2026 Valhöll. Все права защищены.</p>
  </footer>

  <script>
    if (!isLoggedIn()) { location.href = 'login.html?redirect=new-post.html'; }

    function convertVideoUrl(url) {
      if (!url) return '';
      const youtube = /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/;
      let m = url.match(youtube);
      if (m) return `https://www.youtube.com/embed/${m[1]}`;
      const rutube = /rutube\.ru\/video\/([a-zA-Z0-9_-]+)/;
      m = url.match(rutube);
      if (m) return `https://rutube.ru/play/embed/${m[1]}`;
      return url;
    }

    function previewImage(url) {
      const el = document.getElementById('image-preview');
      if (!url) { el.innerHTML = ''; return; }
      el.innerHTML = `<img src="${url}" class="new-post-preview-img" onerror="this.parentElement.innerHTML=''">`;
    }

    function previewVideo(url) {
      const el = document.getElementById('video-preview');
      if (!url) { el.innerHTML = ''; return; }
      const embed = convertVideoUrl(url);
      if (embed.match(/\.mp4$/i)) {
        el.innerHTML = `<video src="${embed}" class="new-post-preview-vid" controls></video>`;
      } else if (embed) {
        el.innerHTML = `<iframe src="${embed}" class="new-post-preview-iframe" allowfullscreen></iframe>`;
      }
    }

    function publishPost() {
      const text = document.getElementById('post-text').value.trim();
      const image = document.getElementById('post-image').value.trim();
      const video = convertVideoUrl(document.getElementById('post-video').value.trim());
      if (!text) return;

      const posts = JSON.parse(localStorage.getItem('valholl_feed')) || [];
      posts.unshift({
        id: Date.now().toString(),
        author: 'Valhöll',
        date: new Date().toISOString().slice(0, 10),
        text,
        image,
        video,
        likes: 0,
        liked: false,
        comments: []
      });
      localStorage.setItem('valholl_feed', JSON.stringify(posts));
      location.href = 'feed.html';
    }
  </script>
</body>
</html>
